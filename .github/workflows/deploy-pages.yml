name: Deploy OleaTax Site

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - 'concepts/**'
      - 'content-workbook.md'
      - 'README.md'
      - 'PRD.md'
      - 'Codex/**'
      - 'OleaMedia/**'
      - 'OleaTax/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare artifact
        run: |
          mkdir -p _site
          rsync -av --delete \
            --exclude '_site' \
            --exclude '.git' \
            --exclude '.github' \
            ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
